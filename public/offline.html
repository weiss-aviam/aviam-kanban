<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aviam Kanban – Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #fafafa;
        color: #18181b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 1.5rem;
      }
      .card {
        text-align: center;
        max-width: 360px;
        width: 100%;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.5rem;
        opacity: 0.3;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.9rem;
        color: #71717a;
        line-height: 1.5;
        margin-bottom: 1.5rem;
      }
      button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1.25rem;
        border-radius: 0.375rem;
        border: 1px solid #e4e4e7;
        background: #ffffff;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        color: #18181b;
      }
      button:hover { background: #f4f4f5; }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
      </svg>
      <h1>Keine Internetverbindung</h1>
      <p>Du bist offline. Bitte prüfe deine Verbindung und versuche es erneut.</p>
      <button onclick="location.reload()">Erneut versuchen</button>
    </div>
  </body>
</html>
